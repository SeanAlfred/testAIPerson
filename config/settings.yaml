# 数字人交互系统配置文件
# 注意：API Keys 和 Base URLs 已移至 config/credentials/api_keys.yaml
# 所有模型的URL和API Key统一在 api_keys.yaml 中配置，方便随时切换

# 系统设置
system:
  name: "数字人交互系统"
  version: "1.0.0"
  debug: true
  log_level: "INFO"

# API服务配置
server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"  # 允许所有来源（浏览器扩展需要）
    - "http://localhost"
    - "http://localhost:3000"
    - "http://127.0.0.1"
    - "null"  # 浏览器扩展某些情况下 origin 为 null

# 大模型配置 (Ollama)
# 注意：Base URL 和 API Key 在 config/credentials/api_keys.yaml 中配置
llm:
  provider: "ollama"
  call_mode: "ollamaAPI"  # ollamaAPI: 传统API调用, zeroToken: 免Token调用
  
  # Ollama配置 (base_url 在 api_keys.yaml)
  ollama:
    model: "qwen3-coder:480b-cloud"  # 可选: llama3, qwen2.5, mistral 等
    timeout: 60
  
  # 备选API配置 (base_url 和 api_key 在 api_keys.yaml)
  openai:
    model: "gpt-4o-mini"
  
  # ZeroToken免Token调用配置
  zero_token:
    platform: "deepseek"  # deepseek, claude, doubao
    model: null  # null表示使用平台默认模型
  
  # DeepSeek官方API配置 (base_url 和 api_key 在 api_keys.yaml)
  deepseek:
    model: "deepseek-chat"  # deepseek-chat, deepseek-reasoner

# 语音合成配置 (Edge-TTS)
tts:
  provider: "edge-tts"
  edge_tts:
    voice: "zh-CN-XiaoxiaoNeural"  # 中文女声
    # 其他可选声音:
    # - zh-CN-YunxiNeural (中文男声)
    # - zh-CN-YunyangNeural (中文男声)
    # - zh-CN-XiaoyiNeural (中文女声)
    rate: "+0%"  # 语速: -50% 到 +100%
    volume: "+0%"  # 音量: -50% 到 +100%

# 语音识别配置 (STT)
# 注意：API Keys 和 Base URLs 在 config/credentials/api_keys.yaml
stt:
  provider: "whisper"  # whisper, azure, baidu, aliyun
  whisper:
    model: "base"  # tiny, base, small, medium, large
    language: "zh"  # zh, en, ja, ko 等
    use_api: false  # 是否使用OpenAI API (true) 或本地模型 (false)
  azure:
    region: "eastasia"
    language: "zh-CN"
  baidu: {}
  aliyun: {}

# 图像生成配置 (云端API)
# 注意：API Keys 在 config/credentials/api_keys.yaml
image:
  provider: "siliconflow"  # siliconflow, replicate, stability
  siliconflow:
    model: "Qwen/Qwen-Image"  # 通义千问图像生成模型
    negative_prompt: "low quality, blurry, distorted, ugly"
  replicate:
    model: "stability-ai/sdxl:39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b"
  stability: {}

# 视频生成配置
# 注意：API Keys 在 config/credentials/api_keys.yaml
video:
  provider: "sadtalker"  # sadtalker, wav2lip
  sadtalker:
    api_url: ""  # 云端服务地址，如使用本地则留空
    preprocess: "crop"
  d_id: {}
  heygen: {}

# 文本到视频生成配置 (SiliconFlow)
# 注意：API Keys 在 config/credentials/api_keys.yaml
text_to_video:
  provider: "siliconflow"
  siliconflow:
    model: "Wan-AI/Wan2.2-T2V-A14B"  # 文生视频模型
    image_to_video_model: "Wan-AI/Wan2.2-I2V-A14B"  # 图生视频模型
    default_size: "1280x720"  # 默认分辨率
    timeout: 300  # 超时时间(秒)

# 数字人配置
digital_human:
  # 默认数字人形象
  default_avatar:
    name: "小婷"
    description: "专业的AI助手，亲切友好"
    style: "professional"

  # 表情/动作配置
  animation:
    blink_rate: 0.1  # 眨眼频率
    head_movement: true  # 是否有头部微动
    idle_animation: true  # 空闲时是否有动画

# 输出配置
output:
  audio_dir: "outputs/audio"
  image_dir: "outputs/images"
  video_dir: "outputs/videos"
  temp_dir: "outputs/temp"

# 对话配置
conversation:
  max_history: 20  # 保留的对话历史条数
  system_prompt: |
    你是一个专业的AI数字人助手，名叫{name}。
    你的特点是：{description}
    请用简洁、友好、专业的方式回答用户的问题。
    回答时注意：
    1. 保持回复简短，适合语音播报
    2. 语气亲切自然
    3. 避免使用Markdown格式

# 网络搜索配置
# 注意：API Keys 在 config/credentials/api_keys.yaml
web_search:
  enabled: true  # 是否启用联网搜索
  provider: "baidu"  # 搜索引擎: baidu, duckduckgo, bing, google
  max_results: 5  # 最大搜索结果数
  timeout: 10  # 请求超时时间(秒)
  max_content_length: 4000  # 最大内容长度
  # 信任的域名优先
  trusted_domains:
    - "wikipedia.org"
    - "baike.baidu.com"
    - "zhihu.com"
    - "news.qq.com"
    - "news.sina.com.cn"
    - "cctv.com"
    - "gov.cn"
    - "github.com"
    - "stackoverflow.com"