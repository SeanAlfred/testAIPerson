<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字人交互系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
            color: var(--text-color);
            min-height: 100vh;
        }

        /* ==================== 主内容区域 ==================== */
        .main-content {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .main-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 加载失败备选界面 */
        .fallback-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .fallback-content {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }

        .fallback-content h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .open-link-btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .open-link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .retry-btn {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* ==================== 悬浮球样式 ==================== */
        .float-ball {
            position: fixed;
            right: 24px;
            bottom: 24px;
            left: auto;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .float-ball.dragging {
            transition: none;
            transform: scale(1.15);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
            cursor: grabbing;
        }

        .float-ball:hover:not(.dragging) {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.6);
        }

        .float-ball.expanded {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .float-ball.snapping {
            transition: left 0.3s ease, right 0.3s ease, transform 0.3s ease;
        }

        .float-ball-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .float-ball-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            background: var(--success-color);
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        /* ==================== 悬浮对话框样式 ==================== */
        .float-dialog {
            position: fixed;
            right: 24px;
            bottom: 24px;
            left: auto;
            width: 800px;
            height: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0) translateY(100%);
            transform-origin: bottom right;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .float-dialog.active {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* 对话框头部 */
        .dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }

        .dialog-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dialog-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .dialog-info h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .dialog-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .dialog-status-dot {
            width: 6px;
            height: 6px;
            background: var(--success-color);
            border-radius: 50%;
        }

        .dialog-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--border-color);
            color: var(--text-color);
        }

        .collapse-btn {
            background: var(--primary-color);
            color: white;
        }

        .collapse-btn:hover {
            background: var(--primary-hover);
        }

        /* 对话框主体 */
        .dialog-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .dialog-sidebar {
            width: 200px;
            background: var(--bg-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 12px;
        }

        .sidebar-avatar-section {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .sidebar-avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .sidebar-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .sidebar-avatar-video {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
            display: none;
        }

        .sidebar-name {
            font-size: 14px;
            font-weight: 600;
        }

        .sidebar-settings {
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-settings h4 {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .setting-item {
            margin-bottom: 10px;
        }

        .setting-item label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .setting-item select {
            width: 100%;
            padding: 6px 8px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 12px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }

        .toggle-item span {
            font-size: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            transition: 0.3s;
            border-radius: 20px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .toggle-slider {
            background-color: var(--primary-color);
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(16px);
        }

        /* 聊天区域 */
        .dialog-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--card-bg);
            border-bottom-left-radius: 4px;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.5;
        }

        .message-audio {
            margin-top: 8px;
        }

        .message-audio audio {
            width: 100%;
            height: 32px;
        }

        .message-video {
            margin-top: 8px;
        }

        .message-video video {
            max-width: 100%;
            border-radius: 8px;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 12px 16px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--error-color);
            color: white;
            border-radius: 16px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .recording-indicator.active {
            display: inline-flex;
        }

        .recording-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: recording-blink 1s infinite;
        }

        @keyframes recording-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .input-container {
            display: flex;
            gap: 8px;
        }

        .input-container textarea {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 14px;
            resize: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
        }

        .input-container textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .send-btn, .voice-btn {
            padding: 10px 16px;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: center;
        }

        .send-btn {
            background: var(--primary-color);
        }

        .send-btn:hover {
            background: var(--primary-hover);
        }

        .voice-btn {
            background: var(--success-color);
        }

        .voice-btn:hover {
            background: #16a34a;
        }

        .voice-btn.recording {
            background: var(--error-color);
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .send-btn:disabled,
        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .action-btn {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* Loading */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Thinking Mode - AI思考模式样式 */
        .thinking-container {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(139, 92, 246, 0.08) 100%);
            border-left: 3px solid #6366f1;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 8px 0;
            position: relative;
            overflow: hidden;
        }

        .thinking-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 500;
            color: #6366f1;
            font-size: 13px;
        }

        .thinking-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            font-size: 11px;
            color: white;
            animation: pulse-thinking 2s ease-in-out infinite;
        }

        @keyframes pulse-thinking {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .thinking-steps {
            font-size: 13px;
            color: #475569;
            line-height: 1.8;
        }

        .thinking-step {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 6px 0;
            opacity: 0;
            transform: translateX(-10px);
            animation: step-appear 0.3s ease forwards;
        }

        .thinking-step-icon {
            color: #6366f1;
            font-size: 12px;
            margin-top: 2px;
        }

        .thinking-step-text {
            flex: 1;
        }

        @keyframes step-appear {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .thinking-progress-bar {
            height: 3px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .thinking-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s ease;
            position: relative;
        }

        .thinking-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-grid .setting-item {
            margin-bottom: 0;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 100px;
            left: auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            display: none;
            z-index: 10001;
            font-size: 13px;
        }

        .toast.active {
            display: block;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.success { border-color: var(--success-color); }
        .toast.error { border-color: var(--error-color); }
        .toast.warning { border-color: var(--warning-color); }

        /* 遮罩层 */
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9997;
            display: none;
        }

        .dialog-overlay.active {
            display: block;
        }

        /* Hidden file input */
        #avatarFileInput {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 主内容区域 - 嵌入外部页面 -->
    <div class="main-content">
        <iframe id="mainFrame" src="/proxy/page"
            frameborder="0"
            allowfullscreen
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-top-navigation">
            您的浏览器不支持 iframe，请升级浏览器。
        </iframe>

        <!-- 加载失败时的备选界面 -->
        <div class="fallback-container" id="fallbackContainer" style="display: none;">
            <div class="fallback-content">
                <h2>🔍 百度搜索</h2>
                <p style="color: var(--text-muted); margin: 16px 0;">页面加载失败，请在新窗口中打开百度</p>
                <a href="https://www.baidu.com" target="_blank" class="open-link-btn">
                    打开百度
                </a>
                <button class="retry-btn" onclick="retryFrame()">重试加载</button>
            </div>
        </div>
    </div>

    <!-- 悬浮球 -->
    <div class="float-ball" id="floatBall" title="点击唤醒助手">

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Hidden file input -->

    <script>
        // API Base URL
        const API_BASE = '';

        // State
        let ws = null;
        let isStreaming = false;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let isDialogExpanded = false;
        let frameLoadTimeout = null;
        let currentCallMode = 'ollamaAPI';
        let currentPlatform = 'deepseek';
        let currentOllamaModel = '';
        let currentDeepseekModel = 'deepseek-chat';
        
        // 意图识别相关状态
        let pendingIntent = null;  // 待确认的意图

        // 加载 Ollama 模型列表
        async function loadOllamaModels() {
            const select = document.getElementById('ollamaModelSelect');
            const status = document.getElementById('ollamaModelStatus');
            
            select.innerHTML = '<option value="">加载中...</option>';
            status.textContent = '正在连接 Ollama...';
            status.style.color = '#888';
            
            try {
                const response = await fetch(`${API_BASE}/api/ollama/models`);
                const data = await response.json();
                
                select.innerHTML = '';
                
                if (data.success && data.models.length > 0) {
                    for (const model of data.models) {
                        const option = document.createElement('option');
                        option.value = model.name;
                        option.textContent = model.name;
                        select.appendChild(option);
                    }
                    
                    // 恢复上次选择的模型
                    const savedModel = localStorage.getItem('ollamaModel');
                    if (savedModel && data.models.some(m => m.name === savedModel)) {
                        select.value = savedModel;
                        currentOllamaModel = savedModel;
                    } else {
                        currentOllamaModel = data.models[0].name;
                    }
                    
                    status.textContent = `已加载 ${data.models.length} 个模型`;
                    status.style.color = '#52c41a';
                } else {
                    select.innerHTML = '<option value="">无可用模型</option>';
                    status.textContent = data.error || 'Ollama 服务未运行或无模型';
                    status.style.color = '#ff4d4f';
                }
            } catch (error) {
                select.innerHTML = '<option value="">连接失败</option>';
                status.textContent = '无法连接到 Ollama 服务';
                status.style.color = '#ff4d4f';
                console.error('加载Ollama模型失败:', error);
            }
        }

        // 处理 Ollama 模型变化
        function handleOllamaModelChange() {
            const model = document.getElementById('ollamaModelSelect').value;
            currentOllamaModel = model;
            localStorage.setItem('ollamaModel', model);
            showToast(`已选择模型: ${model}`);
        }

        // 处理调用模式变化
        function handleCallModeChange() {
            const callMode = document.getElementById('callModeSelect').value;
            currentCallMode = callMode;

            const ollamaModelItem = document.getElementById('ollamaModelItem');
            const deepseekModelItem = document.getElementById('deepseekModelItem');
            const platformItem = document.getElementById('zeroTokenPlatformItem');
            const credentialItem = document.getElementById('credentialConfigItem');
            const gatewayItem = document.getElementById('gatewayStatusItem');
            
            // 隐藏所有模式相关项
            ollamaModelItem.style.display = 'none';
            deepseekModelItem.style.display = 'none';
            platformItem.style.display = 'none';
            credentialItem.style.display = 'none';
            gatewayItem.style.display = 'none';
            
            if (callMode === 'zeroToken') {
                platformItem.style.display = 'block';
                credentialItem.style.display = 'block';
                gatewayItem.style.display = 'block';
                loadZeroTokenPlatforms();
                loadCredentials();
            } else if (callMode === 'deepseekAPI') {
                deepseekModelItem.style.display = 'block';
                // 恢复上次选择的模型
                const savedModel = localStorage.getItem('deepseekModel');
                if (savedModel) {
                    document.getElementById('deepseekModelSelect').value = savedModel;
                    currentDeepseekModel = savedModel;
                }
            } else {
                ollamaModelItem.style.display = 'block';
                loadOllamaModels();
            }

            // 保存到本地存储
            localStorage.setItem('callMode', callMode);

            // 显示提示
            const modeNames = {
                'zeroToken': '免Token',
                'deepseekAPI': 'DeepSeek API',
                'ollamaAPI': 'Ollama API'
            };
            showToast(`已切换到 ${modeNames[callMode]} 模式`);
        }

        // 处理 DeepSeek 模型变化
        function handleDeepseekModelChange() {
            const model = document.getElementById('deepseekModelSelect').value;
            currentDeepseekModel = model;
            localStorage.setItem('deepseekModel', model);
            showToast(`已选择模型: ${model}`);
        }

        // 处理平台变化
        function handlePlatformChange() {
            const platform = document.getElementById('zeroTokenPlatformSelect').value;
            currentPlatform = platform;
            localStorage.setItem('zeroTokenPlatform', platform);
            loadCredentials(); // 加载该平台的凭证
            showToast(`已选择平台: ${platform}`);
        }

        // 加载ZeroToken平台列表
        async function loadZeroTokenPlatforms() {
            try {
                const response = await fetch(`${API_BASE}/api/zerotoken/platforms`);
                const data = await response.json();

                const select = document.getElementById('zeroTokenPlatformSelect');
                select.innerHTML = '';

                for (const platform of data.platforms) {
                    const option = document.createElement('option');
                    option.value = platform.id;
                    option.textContent = platform.name + (platform.has_credentials ? ' ✓' : '');
                    option.dataset.hasCredentials = platform.has_credentials;
                    select.appendChild(option);
                }

                // 恢复上次选择的平台
                const savedPlatform = localStorage.getItem('zeroTokenPlatform');
                if (savedPlatform) {
                    select.value = savedPlatform;
                    currentPlatform = savedPlatform;
                }
                
                // 加载凭证
                loadCredentials();
            } catch (error) {
                console.error('Failed to load ZeroToken platforms:', error);
            }
        }

        // 加载凭证
        async function loadCredentials() {
            const platform = document.getElementById('zeroTokenPlatformSelect').value;
            const statusDiv = document.getElementById('credentialStatus');
            const cookieInput = document.getElementById('cookieInput');
            
            try {
                const response = await fetch(`${API_BASE}/api/zerotoken/credentials/${platform}`);
                const data = await response.json();
                
                if (data.has_credentials) {
                    statusDiv.innerHTML = '<span style="color: #52c41a;">● 已配置</span>';
                    // 从本地存储加载已保存的cookie（不显示完整cookie，只显示状态）
                    const savedCookie = localStorage.getItem(`cookie_${platform}`);
                    if (savedCookie) {
                        cookieInput.value = savedCookie;
                    } else {
                        cookieInput.placeholder = '凭证已保存，输入新值将覆盖';
                    }
                } else {
                    statusDiv.innerHTML = '<span style="color: #faad14;">● 未配置</span> - 请输入Cookie';
                    cookieInput.value = '';
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color: #f5222d;">● 检查失败</span>';
            }
        }

        // 保存凭证
        async function saveCredentials() {
            const platform = document.getElementById('zeroTokenPlatformSelect').value;
            const cookie = document.getElementById('cookieInput').value.trim();
            
            if (!cookie) {
                showToast('请输入Cookie', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/zerotoken/credentials/${platform}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie: cookie })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('凭证保存成功！');
                    localStorage.setItem(`cookie_${platform}`, cookie);
                    document.getElementById('credentialStatus').innerHTML = '<span style="color: #52c41a;">● 已配置</span>';
                    // 更新平台列表显示
                    loadZeroTokenPlatforms();
                } else {
                    showToast('保存失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        // 测试凭证
        async function testCredentials() {
            const platform = document.getElementById('zeroTokenPlatformSelect').value;
            const statusDiv = document.getElementById('credentialStatus');
            
            statusDiv.innerHTML = '<span style="color: #1890ff;">● 测试中...</span>';
            
            try {
                // 发送一个简单的测试消息
                const response = await fetch(`${API_BASE}/api/chat/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: '你好',
                        zero_token_platform: platform,
                        test_mode: true
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = '<span style="color: #52c41a;">● 连接成功！</span>';
                    showToast('凭证有效，连接成功！');
                } else {
                    statusDiv.innerHTML = '<span style="color: #f5222d;">● 连接失败: ' + (data.error || '未知错误') + '</span>';
                    showToast('连接失败，请检查Cookie', 'error');
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color: #f5222d;">● 测试失败</span>';
                showToast('测试失败: ' + error.message, 'error');
            }
        }

        // 显示凭证帮助
        function showCredentialHelp() {
            const platform = document.getElementById('zeroTokenPlatformSelect').value;
            const loginUrls = {
                'deepseek': 'https://chat.deepseek.com',
                'doubao': 'https://www.doubao.com',
                'claude': 'https://claude.ai',
                'kimi': 'https://kimi.moonshot.cn',
                'qwen': 'https://tongyi.aliyun.com',
                'glm': 'https://chatglm.cn'
            };
            
            const helpText = `获取 ${platform.toUpperCase()} Cookie 的步骤：

1. 打开浏览器访问: ${loginUrls[platform] || '该平台网站'}
2. 登录你的账号
3. 按 F12 打开开发者工具
4. 切换到 Network（网络）标签
5. 在页面上发送一条消息或刷新页面
6. 找到任意请求，查看 Request Headers
7. 复制 Cookie 字段的完整内容
8. 粘贴到输入框中并保存

注意：Cookie 包含敏感信息，请勿分享给他人！`;
            
            alert(helpText);
        }

        // 检查 Gateway 状态（保留兼容性）
        async function checkGatewayStatus() {
            const statusDiv = document.getElementById('gatewayStatus');
            const platform = document.getElementById('zeroTokenPlatformSelect')?.value;
            
            if (!platform) {
                statusDiv.innerHTML = '<span style="color: #666;">请选择平台</span>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/zerotoken/credentials/${platform}`);
                const data = await response.json();

                if (data.has_credentials) {
                    statusDiv.innerHTML = `<span style="color: #52c41a;">● 已配置</span>`;
                } else {
                    statusDiv.innerHTML = `<span style="color: #faad14;">● 未配置</span> <a href="#" onclick="showCredentialHelp(); return false;" style="color: #1890ff;">获取帮助</a>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #f5222d;">● 检查失败</span>`;
            }
        }

        // 初始化时恢复设置
        function initSettings() {
            const savedCallMode = localStorage.getItem('callMode');
            if (savedCallMode) {
                document.getElementById('callModeSelect').value = savedCallMode;
                currentCallMode = savedCallMode;

                // 隐藏所有模式相关项
                document.getElementById('ollamaModelItem').style.display = 'none';
                document.getElementById('deepseekModelItem').style.display = 'none';
                document.getElementById('zeroTokenPlatformItem').style.display = 'none';
                document.getElementById('credentialConfigItem').style.display = 'none';
                document.getElementById('gatewayStatusItem').style.display = 'none';

                if (savedCallMode === 'zeroToken') {
                    document.getElementById('zeroTokenPlatformItem').style.display = 'block';
                    document.getElementById('credentialConfigItem').style.display = 'block';
                    document.getElementById('gatewayStatusItem').style.display = 'block';
                    loadZeroTokenPlatforms();
                } else if (savedCallMode === 'deepseekAPI') {
                    document.getElementById('deepseekModelItem').style.display = 'block';
                    // 恢复上次选择的模型
                    const savedModel = localStorage.getItem('deepseekModel');
                    if (savedModel) {
                        document.getElementById('deepseekModelSelect').value = savedModel;
                        currentDeepseekModel = savedModel;
                    }
                } else {
                    // Ollama API 模式，加载模型列表
                    document.getElementById('ollamaModelItem').style.display = 'block';
                    loadOllamaModels();
                }
            } else {
                // 默认加载 Ollama 模型
                loadOllamaModels();
            }

            const savedPlatform = localStorage.getItem('zeroTokenPlatform');
            if (savedPlatform) {
                currentPlatform = savedPlatform;
            }

            const savedModel = localStorage.getItem('ollamaModel');
            if (savedModel) {
                currentOllamaModel = savedModel;
            }
        }


        // iframe 加载处理
        function onFrameLoad() {
            clearTimeout(frameLoadTimeout);
            try {
                const iframe = document.getElementById('mainFrame');
                // 尝试访问 iframe 内容，如果跨域会抛出错误
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                // 如果能访问，检查是否是空白页或错误页
                if (doc && doc.body && doc.body.innerHTML.length < 100) {
                    showFallback();
                }
            } catch (e) {
                // 跨域限制，说明页面可能正常加载了
                console.log('iframe 跨域限制，页面可能正常加载');
            }
        }

        function onFrameError() {
            showFallback();
        }

        function showFallback() {
            document.getElementById('mainFrame').style.display = 'none';
            document.getElementById('fallbackContainer').style.display = 'flex';
        }

        function retryFrame() {
            document.getElementById('fallbackContainer').style.display = 'none';
            const iframe = document.getElementById('mainFrame');
            iframe.style.display = 'block';
            iframe.src = '/proxy/page?t=' + Date.now();

            // 设置超时
            frameLoadTimeout = setTimeout(() => {
                showFallback();
            }, 10000);
        }

        // 设置初始超时检测
        setTimeout(() => {
            const iframe = document.getElementById('mainFrame');
            if (iframe.style.display !== 'none') {
                // 检查是否加载成功
                // 由于跨域限制，我们无法直接判断，所以保持显示
            }
        }, 15000);

        // Elements (将在 init 中初始化)
        let floatBall, floatDialog, dialogOverlay, chatMessages, messageInput;
        let sendBtn, voiceBtn, statusDot, statusText, recordingIndicator;

        // Initialize
        function init() {
            // 获取元素引用
            floatBall = document.getElementById('floatBall');
            floatDialog = document.getElementById('floatDialog');
            dialogOverlay = document.getElementById('dialogOverlay');
            chatMessages = document.getElementById('chatMessages');
            messageInput = document.getElementById('messageInput');
            sendBtn = document.getElementById('sendBtn');
            voiceBtn = document.getElementById('voiceBtn');
            statusDot = document.getElementById('statusDot');
            statusText = document.getElementById('statusText');
            recordingIndicator = document.getElementById('recordingIndicator');
            
            // iframe 事件监听
            const mainFrame = document.getElementById('mainFrame');
            if (mainFrame) {
                mainFrame.addEventListener('load', onFrameLoad);
                mainFrame.addEventListener('error', onFrameError);
            }
            
            // 初始化功能
            checkStatus();
            connectWebSocket();
            loadVoices();
            initSettings();

            // Auto resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Enter to send
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendBtn.addEventListener('click', sendMessage);
            voiceBtn.addEventListener('click', toggleRecording);

            // Float ball drag functionality

        // Float ball drag functionality
        function initFloatBallDrag() {
            let isDragging = false;
            let hasMoved = false;
            let startX, startY, startLeft, startBottom;
            const BALL_SIZE = 64;
            const MARGIN = 10;

            // 检查元素是否存在
            if (!floatBall) {
                console.error('floatBall element not found');
                return;
            }

            // Load saved position
            const savedPosition = localStorage.getItem('floatBallPosition');
            if (savedPosition) {
                try {
                    const pos = JSON.parse(savedPosition);
                    applyPosition(pos.left, pos.bottom);
                } catch (e) {
                    console.error('Failed to parse saved position:', e);
                }
            }

            function applyPosition(left, bottom) {
                floatBall.style.left = left + 'px';
                floatBall.style.right = 'auto';
                floatBall.style.bottom = bottom + 'px';
            }

            function savePosition(left, bottom) {
                localStorage.setItem('floatBallPosition', JSON.stringify({ left, bottom }));
            }

            function snapToEdge(left) {
                const windowWidth = window.innerWidth;
                const centerX = windowWidth / 2;

                floatBall.classList.add('snapping');

                if (left + BALL_SIZE / 2 < centerX) {
                    // Snap to left edge
                    floatBall.style.left = MARGIN + 'px';
                    floatBall.style.right = 'auto';
                    savePosition(MARGIN, parseFloat(floatBall.style.bottom));
                } else {
                    // Snap to right edge
                    floatBall.style.left = 'auto';
                    floatBall.style.right = MARGIN + 'px';
                    savePosition(windowWidth - MARGIN - BALL_SIZE, parseFloat(floatBall.style.bottom));
                }

                setTimeout(() => floatBall.classList.remove('snapping'), 300);
            }

            // Mouse events
            floatBall.addEventListener('mousedown', (e) => {
                isDragging = true;
                hasMoved = false;
                floatBall.classList.add('dragging');

                startX = e.clientX;
                startY = e.clientY;

                const rect = floatBall.getBoundingClientRect();
                startLeft = rect.left;
                startBottom = window.innerHeight - rect.bottom;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - startX;
                const deltaY = startY - e.clientY; // Inverted for bottom positioning

                const newLeft = Math.max(MARGIN, Math.min(window.innerWidth - BALL_SIZE - MARGIN, startLeft + deltaX));
                const newBottom = Math.max(MARGIN, Math.min(window.innerHeight - BALL_SIZE - MARGIN, startBottom + deltaY));

                if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                    hasMoved = true;
                }

                applyPosition(newLeft, newBottom);
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;

                const wasDragging = isDragging;
                const hadMoved = hasMoved;
                
                isDragging = false;
                floatBall.classList.remove('dragging');

                if (hadMoved) {
                    // Snap to nearest edge
                    const rect = floatBall.getBoundingClientRect();
                    snapToEdge(rect.left);
                } else {
                    // It was a click, expand dialog
                    expandDialog();
                }
            });

            // Touch events for mobile
            floatBall.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                isDragging = true;
                hasMoved = false;
                floatBall.classList.add('dragging');

                startX = touch.clientX;
                startY = touch.clientY;

                const rect = floatBall.getBoundingClientRect();
                startLeft = rect.left;
                startBottom = window.innerHeight - rect.bottom;

                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;

                const touch = e.touches[0];
                const deltaX = touch.clientX - startX;
                const deltaY = startY - touch.clientY;

                const newLeft = Math.max(MARGIN, Math.min(window.innerWidth - BALL_SIZE - MARGIN, startLeft + deltaX));
                const newBottom = Math.max(MARGIN, Math.min(window.innerHeight - BALL_SIZE - MARGIN, startBottom + deltaY));

                if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                    hasMoved = true;
                }

                applyPosition(newLeft, newBottom);
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                if (!isDragging) return;

                isDragging = false;
                floatBall.classList.remove('dragging');

                if (hasMoved) {
                    const rect = floatBall.getBoundingClientRect();
                    snapToEdge(rect.left);
                } else {
                    expandDialog();
                }
            });

            // Handle window resize
            window.addEventListener('resize', () => {
                const rect = floatBall.getBoundingClientRect();
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                // Ensure ball stays within bounds
                let newLeft = Math.max(MARGIN, Math.min(windowWidth - BALL_SIZE - MARGIN, rect.left));
                let newBottom = Math.max(MARGIN, Math.min(windowHeight - BALL_SIZE - MARGIN, window.innerHeight - rect.bottom));

                floatBall.classList.add('snapping');
                applyPosition(newLeft, newBottom);
                savePosition(newLeft, newBottom);
                setTimeout(() => floatBall.classList.remove('snapping'), 300);
            });
        }

        // Connect WebSocket
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/chat`);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'chunk') {
                    appendStreamChunk(data.content);
                } else if (data.type === 'complete') {
                    finalizeStreamMessage(data.content);
                } else if (data.type === 'error') {
                    const streamingMsg = document.getElementById('streaming-message');
                    if (streamingMsg) streamingMsg.remove();
                    isStreaming = false;

                    if (data.error === 'gateway_not_running') {
                        showToast('OpenClaw Gateway 未运行，请先启动服务', 'error');
                    } else {
                        showToast(`错误: ${data.message || data.error}`, 'error');
                    }
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
        }

        // 规划并执行Web任务
        async function planAndExecuteWebTask(text, params) {
            try {
                // 1. 显示规划中状态
                addMessage('assistant', '🤔 正在分析任务并规划执行步骤...', false, null, null, 'text');

                // 2. 请求任务规划
                const planResponse = await fetch(`${API_BASE}/api/task/plan`, {

                });

                const planData = await planResponse.json();

                // 移除规划中消息
                const messages = document.getElementById('chatMessages');
                if (messages.lastChild) {
                    messages.removeChild(messages.lastChild);
                }

                if (planData.success) {
                    // 3. 显示任务计划
                    const planDisplay = planData.data.display_text;
                    addMessage('assistant', planDisplay, false, null, null, 'text');

                    // 4. 询问用户是否执行
                    const confirmed = confirm('任务已规划完成，是否立即执行？\n\n点击"确定"执行任务，点击"取消"取消操作。');
                    
                    if (confirmed) {
                        // 5. 执行任务
                        await executeTaskPlan(planData.data);
                    } else {
                        addMessage('assistant', '❌ 任务已取消', false, null, null, 'text');
                    }
                } else {
                    addMessage('assistant', '❌ 任务规划失败', false, null, null, 'text');
                }

            } catch (error) {
                console.error('Plan web task error:', error);
                addMessage('assistant', '❌ 任务规划失败: ' + error.message, false, null, null, 'text');
            }
        }

        // 执行任务计划
        let browserWindow = null; // 保存打开的浏览器窗口引用

        async function executeTaskPlan(planData) {
            try {
                addMessage('assistant', '🚀 开始执行任务...', false, null, null, 'text');

                let executionLog = [];
                let finalResult = null;
                let taskResults = {}; // 保存每个任务的执行结果

                // 按顺序执行任务
                for (const task of planData.tasks) {
                    // 将前置任务的结果传递给当前任务
                    task._prev_results = {};
                    for (const depId of (task.dependencies || [])) {
                        if (taskResults[depId]) {
                            task._prev_results[depId] = taskResults[depId];
                        }
                    }
                    
                    const taskResult = await executeTask(task, executionLog);
                    taskResults[task.id] = taskResult;
                    
                    if (task.type === 'summarize') {
                        finalResult = taskResult;
                    }
                }

                // 移除执行中消息
                const messages = document.getElementById('chatMessages');
                if (messages.lastChild) {
                    messages.removeChild(messages.lastChild);
                }

                // 显示执行结果
                let resultMessage = `✅ 任务执行完成！\n\n`;
                resultMessage += `📋 执行步骤：\n`;
                executionLog.forEach((log, i) => {
                    resultMessage += `${i + 1}. ${log}\n`;
                });

                if (finalResult && typeof finalResult === 'string') {
                    resultMessage += `\n📝 执行结果：\n${finalResult}`;
                } else if (finalResult && finalResult.summary) {
                    resultMessage += `\n📝 执行结果：\n${finalResult.summary}`;
                } else if (taskResults['task_1']?.results) {
                    // 如果有搜索结果但没有总结，直接显示搜索结果
                    const results = taskResults['task_1'].results;
                    if (results && results.length > 0) {
                        resultMessage += `\n🔍 搜索结果：\n`;
                        results.slice(0, 5).forEach((r, i) => {
                            resultMessage += `${i + 1}. ${r.title || r.name || '结果'}\n`;
                            resultMessage += `   ${r.snippet || r.desc || ''}\n`;
                        });
                    }
                }

                addMessage('assistant', resultMessage, false, null, null, 'text');
                showToast('✅ 任务执行成功', 'success');

            } catch (error) {
                console.error('Execute task plan error:', error);
                addMessage('assistant', '❌ 任务执行失败: ' + error.message, false, null, null, 'text');
                showToast('执行失败', 'error');
            }
        }

        // 执行单个任务
        async function executeTask(task, executionLog) {
            switch (task.type) {
                case 'open_browser':
                    // 打开新的浏览器标签页
                    browserWindow = window.open('about:blank', '_blank');
                    executionLog.push('✅ 已打开新浏览器标签页');
                    return { status: 'success', message: '浏览器已打开' };

                case 'navigate_url':
                    const url = task.params.url || 'https://www.baidu.com';
                    if (browserWindow) {
                        browserWindow.location.href = url;
                    } else {
                        browserWindow = window.open(url, '_blank');
                    }
                    executionLog.push(`✅ 已导航到: ${url}`);
                    return { status: 'success', url: url };

                case 'input_text':
                    const text = task.params.text || '';
                    // 构建搜索URL
                    if (text && browserWindow) {
                        const searchUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(text)}`;
                        browserWindow.location.href = searchUrl;
                        executionLog.push(`✅ 已搜索: "${text}"`);
                    }
                    return { status: 'success', text: text };

                case 'click_element':
                    executionLog.push(`⚠️ 点击操作需要手动完成: ${task.params.selector}`);
                    return { status: 'manual', message: '需要手动点击' };

                case 'search_web':
                    const query = task.params.text || task.params.query || '';
                    if (query) {
                        // 调用后端真正执行搜索
                        executionLog.push(`🔄 正在搜索: "${query}"...`);
                        try {
                            const searchResponse = await fetch(`${API_BASE}/api/task/execute`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    plan_id: 'search',
                                    tasks: [task]
                                })
                            });
                            const searchData = await searchResponse.json();
                            
                            // 同时在浏览器中打开搜索页面
                            const searchUrl = `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`;
                            browserWindow = window.open(searchUrl, '_blank');
                            
                            if (searchData.success && searchData.data.final_result) {
                                const results = searchData.data.final_result;
                                executionLog.push(`✅ 搜索完成，找到 ${results.count || 0} 条结果`);
                                return { 
                                    status: 'success', 
                                    query: query, 
                                    results: results.results,
                                    count: results.count 
                                };
                            }
                        } catch (e) {
                            console.error('Search error:', e);
                        }
                        executionLog.push(`✅ 已在百度搜索: "${query}"`);
                    }
                    return { status: 'success', query: query };

                case 'extract_content':
                    // 如果前置任务有搜索结果，直接返回
                    const prevResults = task._prev_results;
                    if (prevResults && Object.keys(prevResults).length > 0) {
                        for (const key in prevResults) {
                            if (prevResults[key].results) {
                                executionLog.push('✅ 已提取搜索结果');
                                return { 
                                    status: 'success', 
                                    content: prevResults[key].results 
                                };
                            }
                        }
                    }
                    executionLog.push('⚠️ 内容提取需要手动复制');
                    return { status: 'manual', message: '请手动复制页面内容' };

                case 'summarize':
                    // 收集前置任务的结果
                    executionLog.push('🔄 正在生成总结...');
                    let summarizeContent = '';
                    
                    // 从依赖任务中获取内容
                    if (task._prev_results) {
                        for (const key in task._prev_results) {
                            const prevData = task._prev_results[key];
                            if (prevData.results) {
                                summarizeContent += JSON.stringify(prevData.results, null, 2);
                            }
                            if (prevData.content) {
                                summarizeContent += prevData.content;
                            }
                        }
                    }
                    
                    if (summarizeContent) {
                        task.params._prev_results_content = summarizeContent;
                    }
                    
                    try {
                        const response = await fetch(`${API_BASE}/api/task/execute`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                plan_id: 'summarize',
                                tasks: [task]
                            })
                        });
                        const data = await response.json();
                        if (data.success && data.data.final_result) {
                            executionLog.push('✅ 内容总结完成');
                            return data.data.final_result.summary || data.data.final_result;
                        }
                    } catch (e) {
                        console.error('Summarize error:', e);
                    }
                    return { status: 'success', message: '总结完成' };

                case 'wait':
                    const seconds = task.params.seconds || 2;
                    await new Promise(resolve => setTimeout(resolve, seconds * 1000));
                    executionLog.push(`⏳ 等待 ${seconds} 秒`);
                    return { status: 'success' };

                case 'chat':
                    executionLog.push('💬 使用对话回答');
                    return { status: 'success' };

                default:
                    executionLog.push(`⚠️ 未知任务类型: ${task.type}`);
                    return { status: 'unknown' };
            }
        }

        function hideIntentConfirmDialog() {
            document.getElementById('intentConfirmModal').style.display = 'none';
        }

        // 执行确认的意图
        async function executeIntent() {
            if (!pendingIntent) return;

            const { text, intent, params } = pendingIntent;
            sendBtn.disabled = true;

            // 重置进度步骤
            resetProgressSteps();

            // 创建进度消息元素
            const progressMessage = addMessage('assistant', '', false, null, null, 'text');
            updateProgressMessage(progressMessage, '🤔 正在准备执行任务...', 5);

            try {
                // 使用流式端点获取实时进度
                const response = await fetch(`${API_BASE}/api/intent/execute/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        intent: intent,
                        params: params,
                        confirmed: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const eventData = JSON.parse(line.slice(6));
                                
                                if (eventData.type === 'progress') {
                                    // 更新进度消息
                                    updateProgressMessage(progressMessage, eventData.message, eventData.progress);
                                } else if (eventData.type === 'complete') {
                                    // 任务完成
                                    finalizeProgressMessage(progressMessage, eventData, intent);
                                    showToast('✅ 任务执行成功', 'success');
                                } else if (eventData.type === 'error') {
                                    // 错误
                                    updateProgressMessage(progressMessage, '❌ 错误: ' + eventData.message, 0);
                                    showToast('执行失败', 'error');
                                } else if (eventData.type === 'start') {
                                    updateProgressMessage(progressMessage, eventData.message, 5);
                                }
                            } catch (e) {
                                console.error('Parse SSE error:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Execute intent error:', error);
                updateProgressMessage(progressMessage, '❌ 执行失败: ' + error.message, 0);
                showToast('执行失败', 'error');
            } finally {
                pendingIntent = null;
                sendBtn.disabled = false;
            }
        }

        // 存储已显示的进度步骤
        let displayedProgressSteps = [];
        let lastProgressMessage = '';
        
        // 更新进度消息 - AI思考模式样式
        function updateProgressMessage(messageElement, content, progress) {
            const contentDiv = messageElement.querySelector('.message-content');
            if (contentDiv) {
                // 检查是否是新步骤（内容变化）
                const isNewStep = content !== lastProgressMessage;
                if (isNewStep) {
                    displayedProgressSteps.push(content);
                    lastProgressMessage = content;
                }
                
                // 构建思考模式HTML
                let stepsHtml = '';
                displayedProgressSteps.forEach((step, index) => {
                    const isLast = index === displayedProgressSteps.length - 1;
                    const delay = index * 0.1;
                    stepsHtml += `
                        <div class="thinking-step" style="animation-delay: ${delay}s;">
                            <span class="thinking-step-icon">${isLast ? '▶' : '✓'}</span>
                            <span class="thinking-step-text">${step}</span>
                        </div>
                    `;
                });
                
                const thinkingHtml = `
                    <div class="thinking-container">
                        <div class="thinking-header">
                            <span class="thinking-icon">💭</span>
                            <span>AI 正在思考...</span>
                        </div>
                        <div class="thinking-steps">
                            ${stepsHtml}
                        </div>
                        <div class="thinking-progress-bar">
                            <div class="thinking-progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    </div>
                `;
                contentDiv.innerHTML = thinkingHtml;
            }
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

            displayedProgressSteps = [];
            lastProgressMessage = '';

        async function sendNormalMessage(text) {
            const streamMode = document.getElementById('streamMode').checked;
            const generateVideo = document.getElementById('generateVideo').checked;
            const enableSearch = document.getElementById('enableSearch').checked;

            try {
                // 构建请求参数
                const requestBody = {

                    generate_video: generateVideo,
                    call_mode: currentCallMode,
                    enable_search: enableSearch
                };
                
                // 根据调用模式添加对应参数
                if (currentCallMode === 'zeroToken') {
                    requestBody.zero_token_platform = currentPlatform;
                } else if (currentCallMode === 'ollamaAPI') {
                    requestBody.model = currentOllamaModel;
                } else if (currentCallMode === 'deepseekAPI') {
                    requestBody.deepseek_model = currentDeepseekModel;
                }
                
                if (streamMode && ws && ws.readyState === WebSocket.OPEN) {
                    isStreaming = true;
                    addMessage('assistant', '', true, null, null, 'text');
                    const wsMessage = {
                        type: 'chat',
                        text: text,
                        call_mode: currentCallMode,
                        enable_search: enableSearch

                    if (currentCallMode === 'zeroToken') {
                        wsMessage.zero_token_platform = currentPlatform;

                    } else if (currentCallMode === 'deepseekAPI') {

                    }
                    ws.send(JSON.stringify(wsMessage));
                } else {
                    const response = await fetch(`${API_BASE}/api/chat`, {
                        method: 'POST',

                        body: JSON.stringify({
                            text,
                            generate_audio: true,

        // Voice Recording
        async function toggleRecording() {
            if (!isRecording) {
                await startRecording();
            } else {
                await stopRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudioMessage(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                recordingIndicator.classList.add('active');
                voiceBtn.querySelector('span').textContent = '停止';

                showToast('开始录音...', 'success');
            } catch (error) {
                console.error('Failed to start recording:', error);
                showToast('无法访问麦克风', 'error');
            }
        }

        async function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording');
                recordingIndicator.classList.remove('active');
                voiceBtn.querySelector('span').textContent = '语音';
            }
        }

        async function sendAudioMessage(audioBlob) {
            try {
                showToast('正在识别语音...', 'success');

                const formData = new FormData();
                formData.append('file', audioBlob, 'recording.webm');

                const language = document.getElementById('sttLanguage').value;
                if (language !== 'auto') {
                    formData.append('language', language);
                }

                formData.append('generate_audio', 'true');
                formData.append('generate_video', document.getElementById('generateVideo').checked ? 'true' : 'false');

                const response = await fetch(`${API_BASE}/api/chat/audio`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    addMessage('user', `🎤 ${data.data.recognized_text}`);
                    const responseData = data.data.response;
                    if (responseData.audio_url) {
                        showToast('正在播放语音回复...', 'success');
                    }
                    addMessage('assistant', responseData.text, false, responseData.audio_url, responseData.video_url, 'voice');
                } else {
                    showToast('语音识别失败', 'error');
                }
            } catch (error) {
                console.error('Audio message error:', error);
                showToast('语音识别失败: ' + error.message, 'error');
            }
        }

        // Add message to chat
        function addMessage(role, content, isStreaming = false, audioUrl = null, videoUrl = null, inputType = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let audioHtml = '';
            let videoHtml = '';

            if (videoUrl) {
                videoHtml = `<div class="message-video"><video controls src="${videoUrl}"></video></div>`;
                updateAvatarVideo(videoUrl);
            }

            if (role === 'assistant') {
                if (inputType === 'voice' && audioUrl) {
                    audioHtml = `<div class="message-audio"><audio controls autoplay src="${audioUrl}"></audio></div>`;
                } else if (audioUrl) {
                    audioHtml = `<div class="message-audio"><audio controls src="${audioUrl}"></audio></div>`;
                }
            }

            messageDiv.innerHTML = `
                <div class="message-content">${isStreaming ? '<div class="loading-dots"><span></span><span></span><span></span></div>' : formatContent(content)}</div>
                ${audioHtml}
                ${videoHtml}
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            if (isStreaming) {
                messageDiv.id = 'streaming-message';

        // Export chat
        function exportChat() {
            const messages = [];
            document.querySelectorAll('.message').forEach(msg => {
                const role = msg.classList.contains('user') ? '用户' : '助手';
                const content = msg.querySelector('.message-content').textContent;
                messages.push(`【${role}】\n${content}`);
            });

            const text = messages.join('\n\n---\n\n');
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${new Date().toISOString().slice(0, 10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

            const prompt = document.getElementById('videoPrompt').value.trim();

                return;
            }

            const provider = document.getElementById('videoProvider').value;
            const progressText = document.getElementById('progressText');
            
            // 根据生成源获取不同的参数
            let imageSize, negativePrompt;
            if (provider === 'local' || provider === 'animatediff') {
                imageSize = document.getElementById('localResolution').value;
                if (provider === 'animatediff') {
                    negativePrompt = document.getElementById('videoNegativePrompt').value.trim() || 'bad quality, worse quality, low resolution, blurry';
                } else {
                    negativePrompt = '';
                }
                progressText.textContent = '正在使用本地模型生成视频，首次加载模型可能需要较长时间...';

                    body: JSON.stringify({
                        prompt: prompt,

                        negative_prompt: negativePrompt,
