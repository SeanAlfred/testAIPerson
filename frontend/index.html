        function onFaraTaskChange() {
            const taskType = document.getElementById('faraTaskType').value;
            const template = faraTaskTemplates[taskType];
            const container = document.getElementById('faraTaskInputs');
            
            container.innerHTML = '';
            
            if (template.inputs && template.inputs.length > 0) {
                template.inputs.forEach(input => {
                    const div = document.createElement('div');
                    div.className = 'setting-item';
                    div.style.marginBottom = '8px';
                    
                    const label = document.createElement('label');
                    label.textContent = input.label;
                    div.appendChild(label);
                    
                    if (input.type === 'select') {
                        const select = document.createElement('select');
                        select.id = `fara_${input.id}`;
                        select.style.cssText = 'width:100%;padding:8px 12px;background:var(--bg-color);border:1px solid var(--border-color);border-radius:6px;color:var(--text-color);font-size:13px;';
                        input.options.forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.textContent = opt;
                            select.appendChild(option);
                        });
                        div.appendChild(select);
                    } else {
                        const inputEl = document.createElement('input');
                        inputEl.type = input.type || 'text';
                        inputEl.id = `fara_${input.id}`;
                        inputEl.placeholder = input.placeholder;
                        inputEl.style.cssText = 'width:100%;padding:8px 12px;background:var(--bg-color);border:1px solid var(--border-color);border-radius:6px;color:var(--text-color);font-size:13px;';
                        div.appendChild(inputEl);
                    }
                    
                    container.appendChild(div);
                });
            }
            
            // 更新任务输入框
            updateFaraTaskInput();
        }

        function updateFaraTaskInput() {
            const taskType = document.getElementById('faraTaskType').value;
            const template = faraTaskTemplates[taskType];
            const taskInput = document.getElementById('faraTaskInput');
            
            // 收集输入值
            const values = {};
            if (template.inputs) {
                template.inputs.forEach(input => {
                    const el = document.getElementById(`fara_${input.id}`);
                    if (el) values[input.id] = el.value;
                });
            }
            
            // 生成任务描述
            if (taskType !== 'custom') {
                taskInput.value = template.template(values);
            }
            
            // 添加输入事件监听
            if (template.inputs) {
                template.inputs.forEach(input => {
                    const el = document.getElementById(`fara_${input.id}`);
                    if (el) {
                        el.oninput = updateFaraTaskInput;
                    }
                });
            }
        }

        async function executeFaraTask() {
            const taskInput = document.getElementById('faraTaskInput').value.trim();
            const contextInput = document.getElementById('faraContextInput').value.trim();
            
            if (!taskInput) {
                showToast('请输入任务描述', 'error');
                return;
            }
            
            // 显示进度
            document.getElementById('faraProgress').style.display = 'block';
            document.getElementById('faraResult').style.display = 'none';
            document.getElementById('executeFaraBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/fara/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task: taskInput,
                        context: contextInput || null,
                        max_tokens: 1024,
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 显示结果
                    document.getElementById('faraResult').style.display = 'block';
                    const resultContent = document.getElementById('faraResultContent');
                    
                    let resultHtml = `<p style="margin-bottom: 12px;"><strong>任务：</strong>${data.data.task}</p>`;
                    resultHtml += `<p style="margin-bottom: 12px;"><strong>响应：</strong></p>`;
                    resultHtml += `<div style="background: var(--card-bg); padding: 10px; border-radius: 6px; margin-bottom: 12px;">${data.data.response.replace(/\n/g, '<br>')}</div>`;
                    
                    if (data.data.actions && data.data.actions.length > 0) {
                        resultHtml += `<p style="margin-bottom: 8px;"><strong>识别的操作指令：</strong></p>`;
                        resultHtml += `<ul style="margin-left: 20px;">`;
                        data.data.actions.forEach(action => {
                            resultHtml += `<li style="margin-bottom: 4px;">${JSON.stringify(action)}</li>`;
                        });
                        resultHtml += `</ul>`;
                    }
                    
                    resultContent.innerHTML = resultHtml;
                    
                    // 添加到聊天记录
                    addMessage('user', `🌐 网络操作任务: ${taskInput.substring(0, 50)}...`);
                    addMessage('assistant', data.data.response, false, null, null, 'text');
                    
                    showToast('任务执行成功', 'success');
                } else {
                    showToast('任务执行失败: ' + (data.error || '未知错误'), 'error');
                }
            } catch (error) {
                console.error('Fara task error:', error);
                showToast('任务执行失败: ' + error.message, 'error');
            } finally {
                document.getElementById('faraProgress').style.display = 'none';
                document.getElementById('executeFaraBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
